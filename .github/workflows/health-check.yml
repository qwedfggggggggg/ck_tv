name: 源健康检查

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: 检测所有视频源
        run: |
          URL="${{ vars.SITE_URL }}"
          if [ -z "$URL" ]; then
            echo "❌ 请设置 GitHub Actions Variable: SITE_URL=https://你的域名.pages.dev"
            exit 1
          fi
          echo "检测 $URL/api/health ..."
          HTTP_CODE=$(curl -s -o /tmp/health-result.json -w "%{http_code}" \
            "$URL/api/health" --max-time 120)
          echo "状态码: $HTTP_CODE"
          if [ "$HTTP_CODE" = "200" ]; then
            echo "✓ 检测完成"
            cat /tmp/health-result.json | python3 -c "
import json,sys
d=json.load(sys.stdin)
print(f'正常: {d[\"ok\"]}  缓慢: {d[\"slow\"]}  失效: {d[\"dead\"]}  总计: {d[\"total\"]}')
"
          else
            echo "❌ 请求失败"
          fi
