name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install -g pnpm
      - run: pnpm install --frozen-lockfile
      - name: Create KV namespace if needed
        run: |
          if grep -q "PLACEHOLDER_ID" wrangler.toml; then
            npx wrangler@3 kv namespace create CKTV_SEARCH_CACHE 2>&1 | tee kv.out
            KV_ID=$(grep -o '[a-f0-9]\{32\}' kv.out | head -1)
            echo "Created KV namespace: $KV_ID"
            sed -i "s/PLACEHOLDER_ID/$KV_ID/" wrangler.toml
          fi
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      - run: ./deploy.sh
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
