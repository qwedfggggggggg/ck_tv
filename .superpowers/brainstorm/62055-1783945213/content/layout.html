<h2>SYTV 布局方案</h2>
<p class="subtitle">选中一个方向，后面可以细调</p>

<div class="cards">
  <div class="card" data-choice="current" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>1. 保持现有布局</h3>
      <div style="display:flex;gap:0;margin:12px 0;border:1px solid #333;border-radius:8px;overflow:hidden">
        <div style="width:60px;height:120px;background:#2a2a2a;display:flex;align-items:center;justify-content:center;font-size:10px;color:#888">侧<br>栏</div>
        <div style="flex:1;padding:8px;background:#1a1a1a">
          <div style="height:8px;width:60%;background:#333;border-radius:4px;margin-bottom:8px"></div>
          <div style="display:flex;gap:6px">
            <div style="width:50px;height:60px;background:#333;border-radius:4px"></div>
            <div style="width:50px;height:60px;background:#333;border-radius:4px"></div>
            <div style="width:50px;height:60px;background:#333;border-radius:4px"></div>
          </div>
        </div>
      </div>
      <p>侧边栏导航 + 内容区，只在配色和圆角上做更新</p>
    </div>
  </div>

  <div class="card" data-choice="bottom-nav" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>2. 底部导航栏（移动优先）</h3>
      <div style="display:flex;flex-direction:column;gap:0;margin:12px 0;border:1px solid #333;border-radius:8px;overflow:hidden">
        <div style="flex:1;padding:8px;background:#1a1a1a;min-height:100px">
          <div style="height:8px;width:60%;background:#333;border-radius:4px;margin-bottom:8px"></div>
          <div style="display:flex;gap:6px">
            <div style="width:40px;height:50px;background:#333;border-radius:4px"></div>
            <div style="width:40px;height:50px;background:#333;border-radius:4px"></div>
            <div style="width:40px;height:50px;background:#333;border-radius:4px"></div>
          </div>
        </div>
        <div style="height:36px;background:#2a2a2a;display:flex;align-items:center;justify-content:space-around;border-top:1px solid #333">
          <span style="font-size:10px;color:#888">首页</span>
          <span style="font-size:10px;color:#fff">搜索</span>
          <span style="font-size:10px;color:#888">收藏</span>
          <span style="font-size:10px;color:#888">我的</span>
        </div>
      </div>
      <p>底部导航 + 顶部搜索栏，类似 TikTok/YouTube Mobile，手机上更顺手</p>
    </div>
  </div>

  <div class="card" data-choice="hero" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>3. 大 Banner 焦点图布局</h3>
      <div style="display:flex;flex-direction:column;gap:0;margin:12px 0;border:1px solid #333;border-radius:8px;overflow:hidden">
        <div style="height:80px;background:linear-gradient(135deg,#8b5cf6,#ec4899);display:flex;align-items:flex-end;padding:8px">
          <div style="height:6px;width:40%;background:rgba(255,255,255,0.3);border-radius:4px"></div>
        </div>
        <div style="padding:8px;background:#1a1a1a">
          <div style="height:6px;width:30%;background:#333;border-radius:4px;margin-bottom:6px"></div>
          <div style="display:flex;gap:5px">
            <div style="width:35px;height:45px;background:#333;border-radius:4px"></div>
            <div style="width:35px;height:45px;background:#333;border-radius:4px"></div>
            <div style="width:35px;height:45px;background:#333;border-radius:4px"></div>
          </div>
        </div>
      </div>
      <p>顶部大横幅推荐 + 分类内容流，类似 Disney+/HBO，视觉冲击强</p>
    </div>
  </div>
</div>
