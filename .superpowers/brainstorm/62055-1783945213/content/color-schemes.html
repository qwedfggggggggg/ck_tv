<h2>SYTV 配色方案</h2>
<p class="subtitle">选择你喜欢的配色方向，后面再细化布局</p>

<div class="cards">
  <!-- 方案 A -->
  <div class="card" data-choice="a" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>A. 极黑 · 暖橙红</h3>
      <div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap">
        <div style="width:40px;height:40px;border-radius:8px;background:#0a0a0a;border:1px solid #333" title="#0a0a0a"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#e50914" title="#e50914"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#f97316" title="#f97316"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#1f1f1f;border:1px solid #333" title="#1f1f1f"></div>
      </div>
      <p>纯黑底 + 橙色渐变强调，类似 Netflix 风格，视觉冲击强</p>
      <div class="pros-cons" style="margin-top:8px">
        <div class="pros"><h4>优点</h4><ul><li>内容最突出</li><li>能耗低(OLED)</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>较常见</li></ul></div>
      </div>
    </div>
  </div>

  <!-- 方案 B -->
  <div class="card" data-choice="b" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>B. 深蓝灰 · 渐变紫蓝</h3>
      <div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap">
        <div style="width:40px;height:40px;border-radius:8px;background:#0f172a;border:1px solid #333" title="#0f172a"></div>
        <div style="width:80px;height:40px;border-radius:8px;background:linear-gradient(135deg,#6366f1,#06b6d4)" title="渐变 #6366f1 → #06b6d4"></div>
        <div style="width:40px;height:40px;border-radius:8px;background:#1e293b;border:1px solid #333" title="#1e293b"></div>
      </div>
      <p>深蓝灰底 + 靛蓝→青色渐变，Disney+/HBO 风格，沉稳科技感</p>
      <div class="pros-cons" style="margin-top:8px">
        <div class="pros"><h4>优点</h4><ul><li>专业感强</li><li>不刺眼</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>偏冷淡</li></ul></div>
      </div>
    </div>
  </div>

  <!-- 方案 C -->
  <div class="card" data-choice="c" onclick="toggleSelect(this)">
    <div class="card-body">
      <h3>C. 暖深灰 · 紫粉橙渐变</h3>
      <div style="display:flex;gap:8px;margin:12px 0;flex-wrap:wrap">
        <div style="width:40px;height:40px;border-radius:8px;background:#1a1a1a;border:1px solid #444" title="#1a1a1a"></div>
        <div style="width:120px;height:40px;border-radius:8px;background:linear-gradient(135deg,#8b5cf6,#ec4899,#f97316)" title="渐变 #8b5cf6 → #ec4899 → #f97316"></div>
      </div>
      <p>暖灰底 + 紫→粉→橙三色渐变，2026 年趋势，年轻活力</p>
      <div class="pros-cons" style="margin-top:8px">
        <div class="pros"><h4>优点</h4><ul><li>独特性强</li><li>时尚前卫</li></ul></div>
        <div class="cons"><h4>缺点</h4><ul><li>渐变需节制使用</li></ul></div>
      </div>
    </div>
  </div>
</div>
