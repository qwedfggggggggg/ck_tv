<h2>焦点图布局细化</h2>
<p class="subtitle">每个区块点选确认，或告诉我你的想法</p>

<div class="section">
  <h3>整体结构预览</h3>
  <div style="border:1px solid #333;border-radius:12px;overflow:hidden">
    <!-- 顶部渐变条 -->
    <div style="height:4px;background:linear-gradient(90deg,#8b5cf6,#ec4899,#f97316)"></div>
    
    <!-- 顶部导航 -->
    <div style="display:flex;align-items:center;justify-content:space-between;padding:8px 16px;background:#1a1a1a;border-bottom:1px solid #222">
      <div style="display:flex;align-items:center;gap:12px">
        <span style="font-weight:bold;font-size:16px;background:linear-gradient(90deg,#8b5cf6,#f97316);-webkit-background-clip:text;color:transparent">SYTV</span>
        <span style="color:#666;font-size:12px">电影</span>
        <span style="color:#666;font-size:12px">剧集</span>
        <span style="color:#666;font-size:12px">综艺</span>
        <span style="color:#666;font-size:12px">分类</span>
      </div>
      <div style="display:flex;gap:8px">
        <div style="width:20px;height:20px;border-radius:50%;background:#333"></div>
      </div>
    </div>

    <!-- Banner 焦点图 -->
    <div style="height:200px;background:linear-gradient(135deg,#2d1b69 0%,#1a1a2e 50%,#16213e 100%);display:flex;align-items:flex-end;padding:20px;position:relative">
      <div style="position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(transparent,#1a1a1a)"></div>
      <div style="position:relative;z-index:1">
        <div style="font-size:10px;color:#a78bfa;margin-bottom:4px">🔥 今日推荐</div>
        <div style="font-size:18px;font-weight:bold;margin-bottom:4px">电影名称</div>
        <div style="font-size:11px;color:#aaa;margin-bottom:8px">2026 · 动作 · 科幻</div>
        <div style="display:flex;gap:8px;align-items:center">
          <button class="mock-button" style="background:linear-gradient(135deg,#8b5cf6,#ec4899);border:none;color:#fff;padding:6px 16px;border-radius:6px;font-size:11px">▶ 播放</button>
          <div style="width:20px;height:20px;border-radius:50%;border:1px solid #666;display:flex;align-items:center;justify-content:center;font-size:10px;color:#666">+</div>
        </div>
      </div>
      <!-- 模拟电影列表横滚 -->
      <div style="position:absolute;bottom:12px;right:16px;display:flex;gap:4px">
        <div style="width:4px;height:4px;border-radius:50%;background:#a78bfa"></div>
        <div style="width:4px;height:4px;border-radius:50%;background:#555"></div>
        <div style="width:4px;height:4px;border-radius:50%;background:#555"></div>
      </div>
    </div>

    <!-- 内容区 -->
    <div style="padding:12px 16px;background:#1a1a1a">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:bold">热门推荐</span>
        <span style="font-size:10px;color:#888">查看更多 →</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        <div><div style="aspect-ratio:2/3;background:#333;border-radius:6px;margin-bottom:4px"></div><div style="height:6px;width:80%;background:#333;border-radius:4px"></div></div>
        <div><div style="aspect-ratio:2/3;background:#333;border-radius:6px;margin-bottom:4px"></div><div style="height:6px;width:80%;background:#333;border-radius:4px"></div></div>
        <div><div style="aspect-ratio:2/3;background:#333;border-radius:6px;margin-bottom:4px"></div><div style="height:6px;width:80%;background:#333;border-radius:4px"></div></div>
        <div><div style="aspect-ratio:2/3;background:#333;border-radius:6px;margin-bottom:4px"></div><div style="height:6px;width:80%;background:#333;border-radius:4px"></div></div>
      </div>
    </div>

    <!-- 第二个内容行 -->
    <div style="padding:12px 16px;background:#1a1a1a;border-top:1px solid #222">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
        <span style="font-size:13px;font-weight:bold">热播剧集</span>
        <span style="font-size:10px;color:#888">查看更多 →</span>
      </div>
      <div style="display:grid;grid-template-columns:repeat(4,1fr);gap:8px">
        <div><div style="aspect-ratio:2/3;background:#333;border-radius:6px;margin-bottom:4px"></div><div style="height:6px;width:80%;background:#333;border-radius:4px"></div></div>
        <div><div style="aspect-ratio:2/3;background:#333;border-radius:6px;margin-bottom:4px"></div><div style="height:6px;width:80%;background:#333;border-radius:4px"></div></div>
        <div><div style="aspect-ratio:2/3;background:#333;border-radius:6px;margin-bottom:4px"></div><div style="height:6px;width:80%;background:#333;border-radius:4px"></div></div>
        <div><div style="aspect-ratio:2/3;background:#333;border-radius:6px;margin-bottom:4px"></div><div style="height:6px;width:80%;background:#333;border-radius:4px"></div></div>
      </div>
    </div>
  </div>
</div>

<div class="section">
  <h3>这个结构感觉怎么样？</h3>
  <p class="subtitle">点击选中，或者直接告诉我你想改哪里</p>
  <div class="options">
    <div class="option" data-choice="good" onclick="toggleSelect(this)">
      <div class="letter">✓</div>
      <div class="content">
        <h3>就这样，很满意</h3>
        <p>继续下一步</p>
      </div>
    </div>
    <div class="option" data-choice="tweak" onclick="toggleSelect(this)">
      <div class="letter">✎</div>
      <div class="content">
        <h3>还不错，但想改一些</h3>
        <p>我来说具体想法</p>
      </div>
    </div>
    <div class="option" data-choice="other" onclick="toggleSelect(this)">
      <div class="letter">?</div>
      <div class="content">
        <h3>有其他想法</h3>
        <p>我想换个方向</p>
      </div>
    </div>
  </div>
</div>
